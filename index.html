<!DOCTYPE html>
<html>
<head>
<title>ShopKart</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
    <h2 class="logo">ShopKart</h2>

    <input type="text" placeholder="Search for products..." class="search">

    <div class="nav-right">
        <button>Login</button>
        <span id="cart-count">0 🛒</span>
    </div>
</header>

<!-- Categories -->
<div class="categories">
    <span>Mobiles</span>
    <span>Fashion</span>
    <span>Electronics</span>
    <span>Home</span>
    <span>Appliances</span>
</div>

<!-- Banner Slider -->
<section class="banner">
    <div class="slides">
        <img src="https://source.unsplash.com/1200x300/?shopping" />
        <img src="https://source.unsplash.com/1200x300/?sale" />
        <img src="https://source.unsplash.com/1200x300/?electronics" />
    </div>
</section>

<!-- Products -->
<section id="products"></section>

<script src="script.js"></script>
</body>
</html>
